name: "🚀 Sentinel-AWS Cyber-Optimizer CI/CD"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sentinel-cyber-optimizer
  EKS_CLUSTER_NAME: sentinel-eks
  PYTHON_VERSION: "3.10"
  TERRAFORM_VERSION: "1.7.0"

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  # =============================================================================
  # Job 1: Unit Tests & Linting
  # =============================================================================
  test:
    name: "🧪 Unit Tests & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lambda/requirements.txt
          pip install pytest pytest-cov bandit safety

      - name: Run Unit Tests
        run: |
          cd lambda && python -m pytest tests/ --cov=. --cov-report=xml

      - name: Security Lint (Bandit)
        run: |
          bandit -r lambda/ -x lambda/tests/ -f json -o bandit-report.json || true
          bandit -r lambda/ -x lambda/tests/ -l medium

      - name: Dependency Safety Check
        run: |
          safety check --file lambda/requirements.txt || echo "Safety check found vulnerabilities, but continuing..."

  # =============================================================================
  # Job 2: Container Build & Vulnerability Scanning
  # =============================================================================
  build-and-scan:
    name: "🛠️ Build & Vulnerability Scan"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image (Local)
        run: |
          docker build -t sentinel-optimizer:latest -f docker/Dockerfile .

      - name: "🔍 Trivy: Vulnerability Scan"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-optimizer:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Job 3: SBOM Generation
  # =============================================================================
  sbom:
    name: "📦 SBOM Generation"
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: "📜 Generate SBOM (Syft)"
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: 'sentinel-optimizer-sbom.json'

      - name: "📤 Upload SBOM Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sentinel-optimizer-sbom.json

      - name: "📦 Upload SBOM to S3"
        if: github.repository == 'Kindee18/sentinel-aws-cyber-optimizer' && secrets.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: S3 Copy
        if: github.repository == 'Kindee18/sentinel-aws-cyber-optimizer' && secrets.AWS_ROLE_ARN != ''
        run: |
          aws s3 cp sentinel-optimizer-sbom.json s3://${{ secrets.SBOM_BUCKET }}/sboms/${{ github.sha }}.json

  # =============================================================================
  # Job 4: Compliance-as-Code (Checkov)
  # =============================================================================
  compliance:
    name: "🛡️ Compliance Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: "Checkov: Scan Infrastructure"
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          quiet: true
          compact: true
          soft_fail: true
          framework: terraform,dockerfile,kubernetes
          output_format: cli,sarif
          output_file_path: console,checkov.sarif

      - name: Upload Checkov results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'checkov.sarif'

  # =============================================================================
  # Job 5: Terraform Plan
  # =============================================================================
  terraform-plan:
    name: "📋 Terraform Plan"
    runs-on: ubuntu-latest
    needs: [compliance]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=terraform.tfvars.example

  # =============================================================================
  # Job 6: Build & Deploy (Production)
  # =============================================================================
  deploy:
    name: "🚀 Build & Deploy to AWS"
    runs-on: ubuntu-latest
    needs: [build-and-scan, sbom, compliance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'Kindee18/sentinel-aws-cyber-optimizer' && secrets.AWS_ROLE_ARN != ''
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f docker/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        run: |
          kubectl apply -f kubernetes/logging-agent/
