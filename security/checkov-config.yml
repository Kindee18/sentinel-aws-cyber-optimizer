# =============================================================================
# Checkov Configuration — Compliance-as-Code
# Policy enforcement for Sentinel-AWS Cyber-Optimizer
# =============================================================================

# Framework selection
framework:
  - terraform
  - dockerfile
  - kubernetes

# Output format
output:
  - cli
  - junitxml

# Specific checks to enforce (critical security policies)
check:
  # S3 Security
  - CKV_AWS_18    # Ensure S3 bucket has access logging enabled
  - CKV_AWS_19    # Ensure S3 bucket has server-side encryption enabled
  - CKV_AWS_21    # Ensure S3 bucket has versioning enabled
  - CKV_AWS_145   # Ensure S3 bucket is encrypted with KMS
  - CKV_AWS_53    # Ensure S3 bucket has block public ACLs enabled
  - CKV_AWS_54    # Ensure S3 bucket has block public policy enabled
  - CKV_AWS_55    # Ensure S3 bucket has ignore public ACLs enabled
  - CKV_AWS_56    # Ensure S3 bucket has restrict public buckets enabled

  # Security Groups
  - CKV_AWS_23    # Ensure security group has description
  - CKV_AWS_24    # Ensure no security group allows ingress from 0.0.0.0/0 to port 22
  - CKV_AWS_25    # Ensure no security group allows ingress from 0.0.0.0/0 to port 3389
  - CKV_AWS_260   # Ensure no security group allows ingress from 0.0.0.0/0 to all ports

  # EKS Security
  - CKV_AWS_37    # Ensure EKS cluster has secrets encryption enabled
  # Note: CKV_AWS_38/39 moved to skip for local kubectl development access
  - CKV_AWS_58    # Ensure EKS cluster has control plane logging enabled

  # IAM
  - CKV_AWS_40    # Ensure IAM policies do not allow full "*" privileges
  - CKV_AWS_61    # Ensure IAM role allows specific services or accounts
  - CKV_AWS_274   # Ensure IAM policies do not grant permissions to all resources

  # KMS
  - CKV_AWS_7     # Ensure KMS key rotation is enabled

    # Networking
  # - CKV_AWS_130   # Ensure VPC subnets do not assign public IP by default

# Directories to scan
directory:
  - terraform/
  - kubernetes/
  - docker/

# Skip specific low-priority checks
skip-check:
  - CKV_AWS_144   # S3 cross-region replication (not needed for dev)
  - CKV_AWS_152   # SQS queue with SSE (we use KMS directly)
  - CKV2_AWS_61   # S3 lifecycle configuration (already configured)
  - CKV_AWS_130   # Public subnets require map_public_ip_on_launch (by design)
  - CKV_AWS_38    # EKS logging (skipped to focus on core security)
  - CKV_AWS_39    # EKS public endpoint (allowed for local development access)

# Compact output for CI
compact: true
quiet: false
