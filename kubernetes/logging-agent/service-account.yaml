# =============================================================================
# Kubernetes Logging Agent — Service Account with IRSA
# OIDC-based workload identity — no hardcoded AWS credentials
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: sentinel-cyber-optimizer
  annotations:
    # IRSA: Map this ServiceAccount to an AWS IAM Role via OIDC
    # The IAM role ARN is provisioned by the Terraform security module
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/sentinel-cyber-optimizer-fluent-bit-irsa-dev"
    # Audience for STS token exchange
    eks.amazonaws.com/sts-regional-endpoints: "true"
