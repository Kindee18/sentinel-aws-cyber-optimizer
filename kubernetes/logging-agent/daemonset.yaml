# =============================================================================
# Kubernetes Logging Agent — Fluent Bit DaemonSet
# Runs on every node to collect and forward container logs
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: sentinel-cyber-optimizer
    app.kubernetes.io/version: "2.2"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit
        app.kubernetes.io/part-of: sentinel-cyber-optimizer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2020"
        prometheus.io/path: "/api/v1/metrics/prometheus"
    spec:
      serviceAccountName: fluent-bit
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30

      # Security: Pod-level security context
      securityContext:
        fsGroup: 65534
        runAsNonRoot: false  # Fluent Bit needs root to read /var/log
        seccompProfile:
          type: RuntimeDefault

      # Tolerations: Run on all nodes including tainted ones
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
          tolerationSeconds: 300

      # Priority class for logging reliability
      priorityClassName: system-node-critical

      containers:
        - name: fluent-bit
          image: amazon/aws-for-fluent-bit:2.32.0
          imagePullPolicy: Always

          # Resource limits for stability
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          # Security: Container-level security context
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - DAC_READ_SEARCH  # Required to read /var/log

          # Environment variables
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: CLUSTER_NAME
              value: "sentinel-eks"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Liveness and readiness probes
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 2020
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Port for metrics and health checks
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP

          # Volume mounts
          volumeMounts:
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: state
              mountPath: /var/fluent-bit/state
            - name: tmp
              mountPath: /tmp

      volumes:
        # Fluent Bit configuration from ConfigMap
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config

        # Host log directories (read-only)
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory

        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate

        # State directory for file tracking (writable)
        - name: state
          emptyDir:
            sizeLimit: 100Mi

        # Temp directory for readOnlyRootFilesystem
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
