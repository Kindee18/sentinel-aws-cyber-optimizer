# =============================================================================
# Kubernetes Logging Agent — Fluent Bit Configuration
# Routes container logs from all nodes to Kinesis Firehose
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: sentinel-cyber-optimizer
data:
  # -------------------------------------------------------------------------
  # Main Fluent Bit configuration
  # -------------------------------------------------------------------------
  fluent-bit.conf: |
    [SERVICE]
        Flush           5
        Log_Level       info
        Daemon          off
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On
        HC_Errors_Count 5
        HC_Retry_Failure_Count 5
        HC_Period       60
        storage.path    /var/fluent-bit/state
        storage.sync    normal
        storage.checksum off
        storage.backlog.mem_limit 5M

    # Input: Tail all container logs
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/fluent-bit/state/flb_container.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Rotate_Wait       30
        Read_from_Head    True

    # Input: Kubernetes system logs
    [INPUT]
        Name              tail
        Tag               kube-system.*
        Path              /var/log/containers/*_kube-system_*.log
        Parser            docker
        DB                /var/fluent-bit/state/flb_kube_system.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    # Filter: Kubernetes metadata enrichment
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off
        Buffer_Size         32k

    # Filter: Add custom fields for tenant identification
    [FILTER]
        Name   record_modifier
        Match  kube.*
        Record cluster_name sentinel-eks
        Record environment dev
        Record pipeline sentinel-cyber-optimizer

    # Filter: Exclude health check noise at the agent level
    [FILTER]
        Name   grep
        Match  kube.*
        Exclude log /health|/ready|/live|kube-probe/

    # Output: Send to Kinesis Firehose
    [OUTPUT]
        Name              kinesis_firehose
        Match             kube.*
        region            us-east-1
        delivery_stream   sentinel-cyber-optimizer-log-stream-dev
        time_key          @timestamp
        time_key_format   %Y-%m-%dT%H:%M:%S
        log_key           log
        Retry_Limit       3

    # Output: CloudWatch for Fluent Bit's own operational logs
    [OUTPUT]
        Name              cloudwatch_logs
        Match             fluent-bit-internal.*
        region            us-east-1
        log_group_name    /aws/eks/sentinel-eks/fluent-bit
        log_stream_prefix fluent-bit-
        auto_create_group true

  # -------------------------------------------------------------------------
  # Log parsers
  # -------------------------------------------------------------------------
  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* [^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S

    [PARSER]
        Name        json_parser
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
